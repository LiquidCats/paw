name: Build Services

on:
  push:
    branches:
      - main
  release:
    types:
      - published

concurrency:
  group: build-services-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Select services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.select.outputs.services }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: filter
        if: ${{ github.event_name == 'push' }}
        uses: dorny/paths-filter@v4
        with:
          filters: |
            kms:
              - 'services/kms/**'
            rater:
              - 'services/rater/**'
            watcher:
              - 'services/watcher/**'

      - name: Select services to build
        id: select
        env:
          CHANGED_SERVICES: ${{ steps.filter.outputs.changes }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            services='["kms","rater","watcher"]'
          elif [ -n "${CHANGED_SERVICES}" ]; then
            services="${CHANGED_SERVICES}"
          else
            services='[]'
          fi

          echo "services=${services}" >> "${GITHUB_OUTPUT}"

      - name: Select image tag
        id: meta
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            image_tag="${RELEASE_TAG}"
          else
            image_tag="$(git rev-parse --short=8 "${GITHUB_SHA}")"
          fi

          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.service }}
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Lowercase Repository Name
        id: repository
        uses: Entepotenz/change-string-case-action-min-dependencies@v1
        with:
          string: ${{ github.repository }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (tag)
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64,linux/arm64/v8
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repository.outputs.lowercase }}/${{ matrix.service }}:${{ needs.changes.outputs.image_tag }}
            ghcr.io/${{ steps.repository.outputs.lowercase }}/${{ matrix.service }}:latest
