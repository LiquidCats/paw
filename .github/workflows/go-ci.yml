name: Go CI

on:
  pull_request:
  push:

concurrency:
  group: go-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed modules
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            lib/evm-input-parser:
              - 'lib/evm-input-parser/**'
              - 'go.work'
              - 'go.work.sum'
            lib/graceful:
              - 'lib/graceful/**'
              - 'go.work'
              - 'go.work.sum'
            lib/jsonrpc:
              - 'lib/jsonrpc/**'
              - 'go.work'
              - 'go.work.sum'
            lib/observer:
              - 'lib/observer/**'
              - 'go.work'
              - 'go.work.sum'
            lib/workers:
              - 'lib/workers/**'
              - 'go.work'
              - 'go.work.sum'
            services/kms:
              - 'services/kms/**'
              - 'lib/graceful/**'
              - 'protos/**'
              - 'go.work'
              - 'go.work.sum'
            services/rater:
              - 'services/rater/**'
              - 'lib/graceful/**'
              - 'go.work'
              - 'go.work.sum'
            services/watcher:
              - 'services/watcher/**'
              - 'lib/graceful/**'
              - 'lib/jsonrpc/**'
              - 'go.work'
              - 'go.work.sum'

  test:
    name: Test ${{ matrix.module }}
    needs: changes
    if: ${{ needs.changes.outputs.modules != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.changes.outputs.modules) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache-dependency-path: |
            **/go.mod
            **/go.sum
            go.work.sum

      - name: Verify Go workspace
        run: |
          test "$(go env GOWORK)" = "${GITHUB_WORKSPACE}/go.work"

      - name: Download dependencies
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: Run tests
        working-directory: ${{ matrix.module }}
        run: go test -count=1 ./...

  lint:
    name: Lint ${{ matrix.module }}
    needs: changes
    if: ${{ needs.changes.outputs.modules != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.changes.outputs.modules) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select golangci-lint version
        id: golangci
        run: |
          case "${{ matrix.module }}" in
            lib/workers)
              version="v2.5.0"
              ;;
            services/rater)
              version="v2.10.1"
              ;;
            services/watcher)
              version="v2.11.1"
              ;;
            *)
              version="v2.11.4"
              ;;
          esac
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Run golangci-lint
        run: |
          docker run --rm \
            -e GOWORK=/src/go.work \
            -v "${GITHUB_WORKSPACE}:/src" \
            -w "/src/${{ matrix.module }}" \
            "golangci/golangci-lint:${{ steps.golangci.outputs.version }}-alpine" \
            golangci-lint run ./...
