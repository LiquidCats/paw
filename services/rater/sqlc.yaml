version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/adapter/postgresql/database/queries"
    schema: "internal/adapter/postgresql/database/migrations"
    gen:
      go:
        package: "database"
        out: "internal/adapter/postgresql/database"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "pg_catalog.numeric"   # see note below re Postgres
            go_type: "github.com/shopspring/decimal.Decimal"
          # Optional: handle nullable numeric
          - db_type: "pg_catalog.numeric"
            nullable: true
            go_type: "github.com/shopspring/decimal.NullDecimal"
